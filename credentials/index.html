<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Catálogo de Certificaciones — Panel de prueba</title>
<style>
  :root {
    --bg: #0d1117;
    --panel: #13181f;
    --panel-border: #232b35;
    --text: #d7dde5;
    --text-dim: #7c8794;
    --accent: #4fd1a5;
    --accent-dim: #2a5f4b;
    --chip-bg: #1a222c;
    --mono: "IBM Plex Mono", "SFMono-Regular", Consolas, monospace;
    --sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    line-height: 1.4;
  }

  header {
    padding: 28px 32px 20px;
    border-bottom: 1px solid var(--panel-border);
  }

  header .eyebrow {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    margin: 0 0 6px;
  }

  header h1 {
    margin: 0;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }

  header p.sub {
    margin: 6px 0 0;
    color: var(--text-dim);
    font-size: 13px;
  }

  .layout {
    display: flex;
    flex-direction: column;
    min-height: calc(100vh - 96px);
  }

  .filters-bar {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px;
    padding: 20px 28px 12px;
    background: var(--panel);
    border-bottom: 1px solid var(--panel-border);
    align-items: start;
  }

  .filter-group[data-kind="search"] {
    grid-column: span 1;
  }

  .filter-group[data-kind="type"] {
    grid-column: span 1;
  }

  .filter-group {
    margin-bottom: 0;
    min-width: 0;
  }

  .filter-pair {
    display: flex;
    flex-direction: column;
    gap: 12px;
    grid-column: span 2;
  }

  .filter-pair .filter-group {
    margin-bottom: 0;
  }

  @media (max-width: 860px) {
    .filter-pair {
      grid-column: span 1;
    }
  }

  .filter-group label.title {
    display: block;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .filter-group[data-kind="domain"] label.title { color: #38bdf8; }
  .filter-group[data-kind="category"] label.title { color: #7dd3fc; }
  .filter-group[data-kind="provider-group"] label.title { color: #f59e0b; }
  .filter-group[data-kind="provider"] label.title { color: #fbbf24; }
  .filter-group[data-kind="type"] label.title { color: #8b5cf6; }
  .filter-group[data-kind="search"] label.title { color: var(--accent); }
  .filter-group[data-kind="tags"] label.title { color: var(--accent); }

  select:disabled, input[type="text"]:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  select, input[type="text"] {
    width: 100%;
    background: var(--chip-bg);
    border: 1px solid var(--panel-border);
    color: var(--text);
    padding: 9px 10px;
    border-radius: 6px;
    font-size: 13px;
    font-family: var(--sans);
  }

  select:focus, input[type="text"]:focus {
    outline: none;
    border-color: var(--accent);
  }

  .checkbox-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text-dim);
    margin-top: 6px;
  }

  .checkbox-row input { accent-color: var(--accent); }

  .selected-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
  }

  .tag-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--chip-bg);
    border: 1px solid var(--panel-border);
    color: var(--text-dim);
    padding: 4px 8px;
    border-radius: 999px;
    font-size: 10.5px;
    font-family: var(--mono);
  }

  .tag-chip-remove {
    cursor: pointer;
    color: var(--accent);
  }

  .tag-suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
  }

  .tag-pill {
    background: var(--chip-bg);
    border: 1px solid var(--panel-border);
    color: var(--text-dim);
    padding: 4px 8px;
    border-radius: 999px;
    font-size: 10.5px;
    font-family: var(--mono);
    cursor: pointer;
  }

  .tag-pill:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .hint {
    margin-top: 8px;
    font-size: 11px;
    color: var(--text-dim);
  }

  #reset-btn {
    width: 100%;
    background: transparent;
    border: 1px solid var(--panel-border);
    color: var(--text-dim);
    padding: 9px 10px;
    border-radius: 6px;
    font-size: 12px;
    font-family: var(--mono);
    cursor: pointer;
    letter-spacing: 0.04em;
    min-height: 40px;
    margin-top: 24px;
  }

  #reset-btn:hover { border-color: var(--accent); color: var(--accent); }

  main { padding: 20px 28px 40px; }

  .results-bar {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 18px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--panel-border);
  }

  .results-count {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text-dim);
  }

  .results-count strong { color: var(--accent); }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 14px;
  }

  .card {
    background: var(--panel);
    border: 1px solid var(--panel-border);
    border-radius: 8px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    transition: border-color 0.15s ease;
  }

  .card:hover { border-color: var(--accent-dim); }

  .card .row-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 10px;
  }

  .card h3 {
    margin: 0;
    font-size: 14.5px;
    font-weight: 600;
    line-height: 1.3;
  }

  .card h3 a {
    color: var(--text);
    text-decoration: none;
  }

  .card h3 a:hover { color: var(--accent); }

  .provider {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    white-space: nowrap;
    flex-shrink: 0;
  }

  .card p.desc {
    margin: 0;
    font-size: 12.5px;
    color: var(--text-dim);
    flex-grow: 1;
  }

  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 4px;
  }

  .chip {
    font-family: var(--mono);
    font-size: 10.5px;
    padding: 3px 8px;
    border-radius: 999px;
    background: var(--chip-bg);
    color: var(--text-dim);
    border: 1px solid var(--panel-border);
  }

  .chip.domain { color: #38bdf8; border-color: #0f3d57; }
  .chip.category { color: #7dd3fc; border-color: #164e63; }
  .chip.type { color: #34d399; border-color: #14532d; }
  .chip.provider-group { color: #f59e0b; border-color: #78350f; }
  .chip.provider { color: #fbbf24; border-color: #92400e; }
  .chip.tag { color: var(--accent); border-color: var(--accent-dim); }

  .meta-row {
    display: flex;
    justify-content: space-between;
    font-family: var(--mono);
    font-size: 10.5px;
    color: var(--text-dim);
    margin-top: 6px;
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 13px;
  }
</style>
</head>
<body>

<header>
  <p class="eyebrow">// certificaciones-api · panel de prueba</p>
  <h1>Catálogo de Certificaciones Gratuitas</h1>
  <p class="sub">Filtra por categoría, proveedor, plataforma, nivel e idioma para probar el dataset.</p>
</header>

<div class="layout">
  <div class="filters-bar">
    <div class="filter-group" data-kind="search">
      <label class="title">Buscar</label>
      <input type="text" id="f-search" placeholder="nombre o descripción..." />
       <div class="filter-group" data-kind="type">
      <label class="title">Tipo</label>
      <select id="f-type"><option value="">Todos</option></select>
    </div>
    </div>



    <div class="filter-pair">
      <div class="filter-group" data-kind="domain">
        <label class="title">Dominio</label>
        <select id="f-domain"><option value="">Todos</option></select>
      </div>

      <div class="filter-group" data-kind="category">
        <label class="title">Categoría</label>
        <select id="f-category" disabled><option value="">Todas</option></select>
      </div>
    </div>

    <div class="filter-pair">
      <div class="filter-group" data-kind="provider-group">
        <label class="title">Grupo de proveedor</label>
        <select id="f-provider-group"><option value="">Todos</option></select>
      </div>

      <div class="filter-group" data-kind="provider">
        <label class="title">Proveedor</label>
        <select id="f-provider" disabled><option value="">Todos</option></select>
      </div>
    </div>


    <div class="filter-group" data-kind="tags">
                <button id="reset-btn">↺ limpiar filtros</button>

      <label class="title">Tags sugeridos</label>
      <input type="text" id="f-tags" placeholder="ej. woman, mooc, cloud" />
      <div id="selected-tags" class="selected-tags"></div>
      <div id="tag-suggestions" class="tag-suggestions"></div>
      <div class="hint">Escribe para buscar un tag y selecciónalo. Puedes quitarlo después con un clic.</div>
    </div>

  </div>

  <main>
    <div class="results-bar">
      <span class="results-count"><strong id="count">0</strong> resultados</span>
    </div>
    <div class="grid" id="grid"></div>
  </main>
</div>

<script>
// ---------------------------------------------------------------------
// Utilidades de datos adaptadas al esquema actual
// ---------------------------------------------------------------------

const uniqueSorted = (arr) =>
  Array.from(new Set(arr.filter(Boolean))).sort((a, b) => a.localeCompare(b));

function getDomains(certs) {
  return uniqueSorted(certs.map((x) => x.domain || x.group).filter(Boolean));
}

function getCategories(certs) {
  return uniqueSorted(certs.map((x) => x.category).filter(Boolean));
}

function getProviders(certs) {
  return uniqueSorted(certs.map((x) => x.provider).filter(Boolean));
}

function getProviderGroups(certs) {
  return uniqueSorted(certs.map((x) => x.providerGroup).filter(Boolean));
}

function getTypes(certs) {
  return uniqueSorted(certs.map((x) => x.type).filter(Boolean));
}

function normalizeTag(value) {
  return String(value || "").trim().toLowerCase();
}

function normalizeFilterValue(value) {
  return String(value || "").trim().toLowerCase();
}

function setSelectValue(selectEl, value) {
  const normalizedValue = normalizeFilterValue(value);
  if (!normalizedValue) {
    selectEl.value = "";
    return;
  }

  const matchedOption = Array.from(selectEl.options).find(
    (option) => normalizeFilterValue(option.value) === normalizedValue
  );

  selectEl.value = matchedOption ? matchedOption.value : "";
}

function parseTags(rawValue) {
  return rawValue
    .split(",")
    .map((value) => normalizeTag(value))
    .filter(Boolean);
}

function getSuggestedTags(certs, rawValue = "") {
  const pool = certs.flatMap((x) => (Array.isArray(x.tags) ? x.tags : []));
  const allTags = uniqueSorted(
    pool
      .map((value) => normalizeTag(value))
      .filter(Boolean)
  );

  const typedToken = normalizeTag((rawValue || "").split(",").pop());

  if (!typedToken) {
    return [];
  }

  return allTags.filter((tag) => !SELECTED_TAGS.includes(tag) && tag.includes(typedToken)).slice(0, 18);
}

function filterCertifications(certs, filters = {}) {
  const { search, domain, category, provider, providerGroup, type, selectedTags = [] } = filters;
  const term = search ? search.trim().toLowerCase() : null;
  const activeTags = selectedTags.map((tag) => normalizeTag(tag)).filter(Boolean);

  return certs.filter((c) => {
    const itemDomain = c.domain || c.group || "";
    const itemType = c.type || "program";

    if (domain && normalizeFilterValue(itemDomain) !== normalizeFilterValue(domain)) return false;
    if (category && normalizeFilterValue(c.category) !== normalizeFilterValue(category)) return false;
    if (provider && normalizeFilterValue(c.provider) !== normalizeFilterValue(provider)) return false;
    if (providerGroup && normalizeFilterValue(c.providerGroup || "") !== normalizeFilterValue(providerGroup)) return false;
    if (type && normalizeFilterValue(itemType) !== normalizeFilterValue(type)) return false;

    if (term) {
      const haystack = `${c.name} ${c.description ?? ""}`.toLowerCase();
      if (!haystack.includes(term)) return false;
    }

    if (activeTags.length > 0) {
      const credentialTags = (Array.isArray(c.tags) ? c.tags : []).map((tag) => normalizeTag(tag));
      const matchesAny = activeTags.some((tag) => credentialTags.includes(tag));
      if (!matchesAny) return false;
    }

    return true;
  });
}

// ---------------------------------------------------------------------
// Estado y render
// ---------------------------------------------------------------------

let DATA = [];
let SELECTED_TAGS = [];

const els = {
  search: document.getElementById("f-search"),
  domain: document.getElementById("f-domain"),
  category: document.getElementById("f-category"),
  provider: document.getElementById("f-provider"),
  providerGroup: document.getElementById("f-provider-group"),
  type: document.getElementById("f-type"),
  tags: document.getElementById("f-tags"),
  selectedTags: document.getElementById("selected-tags"),
  tagSuggestions: document.getElementById("tag-suggestions"),
  grid: document.getElementById("grid"),
  count: document.getElementById("count"),
  resetBtn: document.getElementById("reset-btn"),
};

function setSelectOptions(selectEl, values, currentValue = "") {
  const options = uniqueSorted(values.filter(Boolean));
  selectEl.innerHTML = "";

  const allOption = document.createElement("option");
  allOption.value = "";
  allOption.textContent = "Todos";
  selectEl.appendChild(allOption);

  options.forEach((v) => {
    const opt = document.createElement("option");
    opt.value = v;
    opt.textContent = v;
    selectEl.appendChild(opt);
  });

  if (currentValue && options.includes(currentValue)) {
    selectEl.value = currentValue;
  } else {
    selectEl.value = "";
  }
}

function updateChildSelectState() {
  const hasDomain = Boolean(els.domain.value);
  els.category.disabled = !hasDomain;

  const hasProviderGroup = Boolean(els.providerGroup.value);
  els.provider.disabled = !hasProviderGroup;
}

function populateSelect(selectEl, values) {
  setSelectOptions(selectEl, values);
}

function refreshFilterOptions() {
  const currentDomain = els.domain.value;
  const currentCategory = els.category.value;
  const currentProviderGroup = els.providerGroup.value;
  const currentProvider = els.provider.value;

  const domainValues = uniqueSorted(
    DATA.filter((item) => !currentCategory || item.category === currentCategory)
      .map((item) => item.domain || item.group)
      .filter(Boolean)
  );

  const categoryValues = uniqueSorted(
    DATA.filter((item) => !currentDomain || (item.domain || item.group) === currentDomain)
      .map((item) => item.category)
      .filter(Boolean)
  );

  const providerGroupValues = uniqueSorted(
    DATA.filter((item) => !currentProvider || item.provider === currentProvider)
      .map((item) => item.providerGroup)
      .filter(Boolean)
  );

  const providerValues = uniqueSorted(
    DATA.filter((item) => !currentProviderGroup || (item.providerGroup || "") === currentProviderGroup)
      .map((item) => item.provider)
      .filter(Boolean)
  );

  setSelectOptions(els.domain, domainValues, currentDomain);
  setSelectOptions(els.category, categoryValues, currentCategory);
  setSelectOptions(els.providerGroup, providerGroupValues, currentProviderGroup);
  setSelectOptions(els.provider, providerValues, currentProvider);
  updateChildSelectState();
}

function renderSelectedTags() {
  els.selectedTags.innerHTML = SELECTED_TAGS
    .map((tag) => `
      <span class="tag-chip" data-tag="${tag}">
        ${tag}
        <span class="tag-chip-remove" data-tag="${tag}">✕</span>
      </span>
    `)
    .join("");

  els.selectedTags.querySelectorAll(".tag-chip-remove").forEach((button) => {
    button.addEventListener("click", () => {
      removeSelectedTag(button.getAttribute("data-tag"));
    });
  });
}

function addSelectedTag(tag) {
  const normalized = normalizeTag(tag);
  if (!normalized || SELECTED_TAGS.includes(normalized)) {
    els.tags.value = "";
    renderTagSuggestions(DATA);
    return;
  }

  SELECTED_TAGS.push(normalized);
  els.tags.value = "";
  renderSelectedTags();
  renderTagSuggestions(DATA);
  applyFilters();
}

function removeSelectedTag(tag) {
  SELECTED_TAGS = SELECTED_TAGS.filter((current) => current !== normalizeTag(tag));
  renderSelectedTags();
  renderTagSuggestions(DATA);
  applyFilters();
}

function renderTagSuggestions(certs) {
  const suggestions = getSuggestedTags(certs, els.tags.value);
  els.tagSuggestions.innerHTML = suggestions
    .map((tag) => `<button type="button" class="tag-pill" data-tag="${tag}">${tag}</button>`)
    .join("");

  els.tagSuggestions.querySelectorAll("button").forEach((button) => {
    button.addEventListener("mousedown", (event) => {
      event.preventDefault();
      addSelectedTag(button.getAttribute("data-tag"));
    });
  });
}

function renderCard(item) {
  const domainLabel = item.domain || item.group || "—";
  const typeLabel = item.type || "program";
  const tags = (Array.isArray(item.tags) ? item.tags : [])
    .map((tag) => normalizeTag(tag))
    .filter(Boolean);

  return `
    <div class="card">
      <div class="row-top">
        <h3><a href="${item.url}" target="_blank" rel="noopener">${item.name}</a></h3>
        <span class="provider">${item.provider}</span>
      </div>
      <p class="desc">${item.description}</p>
      <div class="chips">
        <span class="chip category">${item.category}</span>
        <span class="chip type">${typeLabel}</span>
      </div>
      ${tags.length ? `<div class="chips">${tags.map((tag) => `<span class="chip tag">${tag}</span>`).join("")}</div>` : ""}
      <div class="meta-row">
        <a href="${item.url}" target="_blank" rel="noopener noreferrer">${item.url}</a>
      </div>
    </div>
  `;
}

function getCurrentFilterState() {
  return {
    search: els.search.value,
    domain: els.domain.value,
    category: els.category.value,
    provider: els.provider.value,
    providerGroup: els.providerGroup.value,
    type: els.type.value,
    selectedTags: SELECTED_TAGS,
  };
}

function syncFiltersToUrl() {
  const params = new URLSearchParams(window.location.search);
  const state = getCurrentFilterState();

  const filterKeys = ["search", "domain", "category", "provider", "providerGroup", "type"];
  filterKeys.forEach((key) => {
    const value = state[key];
    if (value) {
      params.set(key, value);
    } else {
      params.delete(key);
    }
  });

  const tagsValue = SELECTED_TAGS.join(",");
  if (tagsValue) {
    params.set("tags", tagsValue);
  } else {
    params.delete("tags");
  }

  const query = params.toString();
  const nextUrl = `${window.location.pathname}${query ? `?${query}` : ""}${window.location.hash || ""}`;
  window.history.replaceState({}, "", nextUrl);
}

function readFiltersFromUrl() {
  const params = new URLSearchParams(window.location.search);
  return {
    search: params.get("search") || "",
    domain: params.get("domain") || "",
    category: params.get("category") || "",
    provider: params.get("provider") || "",
    providerGroup: params.get("providerGroup") || "",
    type: params.get("type") || "",
    tags: params.get("tags") || "",
  };
}

function applyFilters() {
  const filters = {
    search: els.search.value,
    domain: els.domain.value,
    category: els.category.value,
    provider: els.provider.value,
    providerGroup: els.providerGroup.value,
    type: els.type.value,
    selectedTags: SELECTED_TAGS,
  };

  const results = filterCertifications(DATA, filters);
  els.count.textContent = results.length;
  syncFiltersToUrl();

  if (results.length === 0) {
    els.grid.innerHTML = `<div class="empty-state">Sin resultados para estos filtros.</div>`;
    return;
  }

  els.grid.innerHTML = results.map(renderCard).join("");
}

function resetFilters() {
  els.search.value = "";
  els.tags.value = "";
  SELECTED_TAGS = [];
  [els.domain, els.category, els.provider, els.providerGroup, els.type].forEach((s) => (s.value = ""));
  renderSelectedTags();
  renderTagSuggestions(DATA);
  applyFilters();
}

async function init() {
  const res = await fetch("./Credentials.json");
  const json = await res.json();
  DATA = json.Credentials || [];

  populateSelect(els.type, getTypes(DATA));
  refreshFilterOptions();
  const initialFilters = readFiltersFromUrl();

  els.search.value = initialFilters.search;
  setSelectValue(els.domain, initialFilters.domain);
  setSelectValue(els.category, initialFilters.category);
  setSelectValue(els.provider, initialFilters.provider);
  setSelectValue(els.providerGroup, initialFilters.providerGroup);
  setSelectValue(els.type, initialFilters.type);

  SELECTED_TAGS = (initialFilters.tags || "")
    .split(",")
    .map((tag) => normalizeTag(tag))
    .filter(Boolean);

  refreshFilterOptions();
  renderSelectedTags();
  renderTagSuggestions(DATA);
  updateChildSelectState();

  [els.search, els.domain, els.category, els.provider, els.providerGroup, els.type].forEach((el) => {
    el.addEventListener("input", () => {
      if (el !== els.search) {
        refreshFilterOptions();
      }
      applyFilters();
    });
    el.addEventListener("change", () => {
      refreshFilterOptions();
      applyFilters();
    });
  });

  els.domain.addEventListener("change", () => {
    if (!els.domain.value) {
      els.category.value = "";
      els.category.disabled = true;
    } else {
      els.category.disabled = false;
    }
    refreshFilterOptions();
    applyFilters();
  });

  els.providerGroup.addEventListener("change", () => {
    if (!els.providerGroup.value) {
      els.provider.value = "";
      els.provider.disabled = true;
    } else {
      els.provider.disabled = false;
    }
    refreshFilterOptions();
    applyFilters();
  });

  els.tags.addEventListener("input", () => {
    renderTagSuggestions(DATA);
    applyFilters();
  });
  els.tags.addEventListener("keydown", (event) => {
    if (event.key === "Enter") {
      event.preventDefault();
      addSelectedTag(els.tags.value);
    }

    if (event.key === "Backspace" && els.tags.value === "" && SELECTED_TAGS.length > 0) {
      removeSelectedTag(SELECTED_TAGS[SELECTED_TAGS.length - 1]);
    }
  });
  els.tags.addEventListener("change", () => {
    renderTagSuggestions(DATA);
    applyFilters();
  });

  els.resetBtn.addEventListener("click", resetFilters);
  applyFilters();
}

init().catch((err) => {
  els.grid.innerHTML = `<div class="empty-state">Error cargando Credentials.json: ${err.message}<br>Asegúrate de que el archivo esté en la misma carpeta y de abrir esto con un servidor local (no file://).</div>`;
});
</script>

</body>
</html>
